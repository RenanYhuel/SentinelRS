services:
    timescaledb:
        image: timescale/timescaledb:latest-pg14
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-sentinel}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_secret}
            POSTGRES_DB: ${POSTGRES_DB:-sentinel}
        ports:
            - "5432:5432"
        volumes:
            - sentinel-db-data:/var/lib/postgresql/data
        networks:
            - sentinel-net
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel}",
                ]
            interval: 5s
            timeout: 3s
            retries: 10

    nats:
        image: nats:2.10-alpine
        restart: unless-stopped
        command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
        ports:
            - "4222:4222"
            - "8222:8222"
        volumes:
            - sentinel-nats-data:/data
        networks:
            - sentinel-net
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "-q",
                    "-O",
                    "/dev/null",
                    "http://localhost:8222/healthz",
                ]
            interval: 5s
            timeout: 5s
            retries: 15
            start_period: 10s

    sentinel-server:
        build:
            context: ..
            dockerfile: docker/Dockerfile.server
        image: sentinelrs/server:${SENTINEL_VERSION:-latest}
        restart: unless-stopped
        depends_on:
            timescaledb:
                condition: service_healthy
            nats:
                condition: service_healthy
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgres://sentinel:sentinel_secret@timescaledb:5432/sentinel}
            NATS_URL: ${NATS_URL:-nats://nats:4222}
            GRPC_PORT: ${GRPC_PORT:-50051}
            REST_PORT: ${REST_PORT:-8080}
            JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
            SERVER_GRPC_ADVERTISE_ADDR: ${SERVER_GRPC_ADVERTISE_ADDR:-http://sentinel-server:50051}
            RUST_LOG: ${SERVER_LOG_LEVEL:-info}
        ports:
            - "${SERVER_GRPC_PORT:-50051}:50051"
            - "${SERVER_REST_PORT:-8080}:8080"
        networks:
            - sentinel-net
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s

    sentinel-worker:
        build:
            context: ..
            dockerfile: docker/Dockerfile.worker
        image: sentinelrs/worker:${SENTINEL_VERSION:-latest}
        restart: unless-stopped
        depends_on:
            sentinel-server:
                condition: service_healthy
        environment:
            DATABASE_URL: ${DATABASE_URL:-postgres://sentinel:sentinel_secret@timescaledb:5432/sentinel}
            NATS_URL: ${NATS_URL:-nats://nats:4222}
            WORKER_CONSUMER_GROUP: ${WORKER_CONSUMER_GROUP:-sentinel-workers}
            RUST_LOG: ${WORKER_LOG_LEVEL:-info}
        networks:
            - sentinel-net
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9090/healthz"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        deploy:
            replicas: 1

    sentinel-agent:
        build:
            context: ..
            dockerfile: docker/Dockerfile.agent
        image: sentinelrs/agent:${SENTINEL_VERSION:-latest}
        restart: unless-stopped
        depends_on:
            sentinel-server:
                condition: service_healthy
        environment:
            SERVER_URL: ${SERVER_URL:-http://sentinel-server:50051}
            RUST_LOG: ${AGENT_LOG_LEVEL:-info}
            AGENT_COLLECT_INTERVAL: ${AGENT_COLLECT_INTERVAL:-10}
        volumes:
            - sentinel-agent-config:/etc/sentinel
        networks:
            - sentinel-net
        profiles:
            - agent

volumes:
    sentinel-db-data:
    sentinel-nats-data:
    sentinel-agent-config:

networks:
    sentinel-net:
        driver: bridge
