syntax = "proto3";
package sentinel.common;

// ═══════════════════════════════════════════════════════════════
// Shared types
// ═══════════════════════════════════════════════════════════════

enum MetricType {
  METRIC_TYPE_UNSPECIFIED = 0;
  GAUGE = 1;
  COUNTER = 2;
  HISTOGRAM = 3;
}

message Histogram {
  repeated double boundaries = 1;
  repeated uint64 counts = 2;
  uint64 count = 3;
  double sum = 4;
}

message Metric {
  string name = 1;
  map<string, string> labels = 2;
  MetricType rtype = 3;
  oneof value {
    double value_double = 4;
    int64 value_int = 5;
    Histogram histogram = 6;
  }
  int64 timestamp_ms = 7;
}

// ═══════════════════════════════════════════════════════════════
// V1 Legacy (backward-compatible unary RPCs)
// ═══════════════════════════════════════════════════════════════

message Batch {
  string agent_id = 1;
  string batch_id = 2;
  uint64 seq_start = 3;
  uint64 seq_end = 4;
  int64 created_at_ms = 5;
  repeated Metric metrics = 6;
  map<string, string> meta = 7;
}

message RegisterRequest {
  string hw_id = 1;
  string agent_version = 2;
}

message RegisterResponse {
  string agent_id = 1;
  string secret = 2;
}

message Heartbeat {
  string agent_id = 1;
  int64 ts_ms = 2;
  map<string, string> info = 3;
}

message PushResponse {
  enum Status {
    OK = 0;
    REJECTED = 1;
    RETRY = 2;
  }
  Status status = 1;
  string message = 2;
}

service AgentService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc PushMetrics(Batch) returns (PushResponse);
  rpc SendHeartbeat(Heartbeat) returns (PushResponse);
}

// ═══════════════════════════════════════════════════════════════
// V2 Bi-Directional Streaming Protocol
// ═══════════════════════════════════════════════════════════════

message AgentMessage {
  oneof payload {
    HandshakeRequest handshake = 1;
    MetricsBatch metrics_batch = 2;
    HeartbeatPing heartbeat_ping = 3;
    BootstrapRequest bootstrap_request = 4;
  }
}

message ServerMessage {
  oneof payload {
    HandshakeAck handshake_ack = 1;
    BatchAck batch_ack = 2;
    HeartbeatPong heartbeat_pong = 3;
    BootstrapResponse bootstrap_response = 4;
    ConfigUpdate config_update = 5;
    Command command = 6;
    ServerError error = 7;
  }
}

// --- Handshake (mutual authentication) ---

message HandshakeRequest {
  string agent_id = 1;
  string agent_version = 2;
  repeated string capabilities = 3;
  string key_id = 4;
  int64 timestamp_ms = 5;
  string signature = 6;
}

message HandshakeAck {
  HandshakeStatus status = 1;
  string message = 2;
  int64 server_time_ms = 3;
  int64 heartbeat_interval_ms = 4;
}

enum HandshakeStatus {
  HANDSHAKE_OK = 0;
  HANDSHAKE_REJECTED = 1;
  HANDSHAKE_UPGRADE_REQUIRED = 2;
}

// --- Metrics via stream ---

message MetricsBatch {
  string batch_id = 1;
  uint64 seq_start = 2;
  uint64 seq_end = 3;
  int64 created_at_ms = 4;
  repeated Metric metrics = 5;
  map<string, string> meta = 6;
  string signature = 7;
}

message BatchAck {
  string batch_id = 1;
  BatchAckStatus status = 2;
  string message = 3;
}

enum BatchAckStatus {
  BATCH_ACCEPTED = 0;
  BATCH_REJECTED = 1;
  BATCH_RETRY = 2;
}

// --- Heartbeat (with live telemetry) ---

message HeartbeatPing {
  int64 timestamp_ms = 1;
  SystemStats system_stats = 2;
}

message SystemStats {
  double cpu_percent = 1;
  uint64 memory_used_bytes = 2;
  uint64 memory_total_bytes = 3;
  uint64 disk_used_bytes = 4;
  uint64 disk_total_bytes = 5;
  double load_avg_1m = 6;
  uint32 process_count = 7;
  uint64 uptime_seconds = 8;
  string os_name = 9;
  string hostname = 10;
}

message HeartbeatPong {
  int64 server_time_ms = 1;
  int64 next_heartbeat_interval_ms = 2;
}

// --- Bootstrap (Zero-Touch Provisioning) ---

message BootstrapRequest {
  string bootstrap_token = 1;
  string hw_id = 2;
  string agent_version = 3;
}

message BootstrapResponse {
  BootstrapStatus status = 1;
  string agent_id = 2;
  string secret = 3;
  string key_id = 4;
  bytes config_yaml = 5;
  string message = 6;
}

enum BootstrapStatus {
  BOOTSTRAP_OK = 0;
  BOOTSTRAP_INVALID_TOKEN = 1;
  BOOTSTRAP_EXPIRED_TOKEN = 2;
}

// --- Remote Config Update ---

message ConfigUpdate {
  int64 version = 1;
  bytes config_yaml = 2;
}

// --- Remote Commands ---

message Command {
  string command_id = 1;
  oneof action {
    ReloadConfig reload_config = 2;
    RestartCollector restart_collector = 3;
    UpdateInterval update_interval = 4;
  }
}

message ReloadConfig {}

message RestartCollector {}

message UpdateInterval {
  uint64 interval_seconds = 1;
}

// --- Stream-level error ---

message ServerError {
  uint32 code = 1;
  string message = 2;
  bool fatal = 3;
}

// V2 persistent streaming service
service SentinelStream {
  rpc OpenStream(stream AgentMessage) returns (stream ServerMessage);
}
