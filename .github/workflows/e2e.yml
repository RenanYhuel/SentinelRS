name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always
    NATS_URL: nats://127.0.0.1:14222
    DATABASE_URL: postgres://postgres:postgres@127.0.0.1:15432/sentinel_e2e
    GRPC_ADDR: 127.0.0.1:50061
    REST_ADDR: 127.0.0.1:8090

jobs:
    e2e:
        name: End-to-End
        runs-on: ubuntu-latest
        timeout-minutes: 20

        services:
            nats:
                image: nats:2.10-alpine
                ports:
                    - 14222:4222
                    - 18222:8222
                options: >-
                    --health-cmd "nc -z localhost 4222 || exit 1"
                    --health-interval 3s
                    --health-timeout 3s
                    --health-retries 15

            timescaledb:
                image: timescale/timescaledb:latest-pg14
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: sentinel_e2e
                ports:
                    - 15432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 15

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - name: Install protoc
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-e2e-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-e2e-

            - name: Build all binaries
              run: cargo build --release

            - name: Start server
              run: |
                  SENTINEL_GRPC_ADDR="$GRPC_ADDR" \
                  SENTINEL_REST_ADDR="$REST_ADDR" \
                  SENTINEL_NATS_URL="$NATS_URL" \
                  SENTINEL_DATABASE_URL="$DATABASE_URL" \
                    ./target/release/sentinel_server &
                  echo "SERVER_PID=$!" >> $GITHUB_ENV

            - name: Start worker
              run: |
                  SENTINEL_NATS_URL="$NATS_URL" \
                  SENTINEL_DATABASE_URL="$DATABASE_URL" \
                    ./target/release/sentinel_workers &
                  echo "WORKER_PID=$!" >> $GITHUB_ENV

            - name: Wait for services
              run: |
                  for i in $(seq 1 30); do
                    STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "http://$REST_ADDR/healthz" 2>/dev/null || echo "000")
                    [ "$STATUS" = "200" ] && break
                    sleep 1
                  done
                  curl -sf "http://$REST_ADDR/healthz" || { echo "Server not healthy"; exit 1; }

            - name: Run Rust integration tests
              env:
                  DATABASE_URL: postgres://postgres:postgres@127.0.0.1:15432/sentinel_e2e
              run: cargo test --workspace --test '*' -- --ignored --test-threads=1
              continue-on-error: true

            - name: Run E2E scenarios
              run: |
                  export PATH="$PWD/target/release:$PATH"
                  alias sentinel_cli=./target/release/sentinel_cli
                  alias sentinel_agent=./target/release/sentinel_agent
                  alias sentinel_workers=./target/release/sentinel_workers

                  FAILURES=0
                  for scenario in tests/e2e/scenarios/*.sh; do
                    [ -f "$scenario" ] || continue
                    name="$(basename "$scenario" .sh)"
                    echo ""
                    echo "=== Scenario: $name ==="
                    if RETRY_MAX=2 RETRY_DELAY=3 bash tests/e2e/retry.sh bash "$scenario"; then
                      echo "  -> PASS"
                    else
                      echo "  -> FAIL"
                      FAILURES=$((FAILURES + 1))
                    fi
                  done

                  echo ""
                  if [ "$FAILURES" -eq 0 ]; then
                    echo "All E2E scenarios passed."
                  else
                    echo "$FAILURES scenario(s) failed."
                    exit 1
                  fi

            - name: Cleanup
              if: always()
              run: |
                  kill ${{ env.SERVER_PID }} 2>/dev/null || true
                  kill ${{ env.WORKER_PID }} 2>/dev/null || true
